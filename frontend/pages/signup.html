<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - Sehat</title>

    <link rel="stylesheet" href="../css/globals.css" />
    <link rel="stylesheet" href="../css/auth.css" />
    <link rel="stylesheet" href="../css/form-message.css" />
  </head>
  <body class="auth-page">
    <div id="toastContainer"></div>
    <header data-layout="header"></header>

    <main class="auth-main center">
      <form class="auth-box" id="signupForm">
        <h2>Create Your Account</h2>
        <p>Join Sehat and start booking appointments</p>
        <p style="font-size: 0.8rem; color: #2563eb; margin-bottom: 1rem">
          * indicates required fields
        </p>

        <!-- User Type Selection  -->
        <div class="user-type-selection">
          <label class="user-type-label">
            <input type="radio" name="userType" value="patient" checked />
            <span class="user-type-span">Patient</span>
          </label>
          <label class="user-type-label">
            <input type="radio" name="userType" value="doctor" />
            <span class="user-type-span">Doctor</span>
          </label>
        </div>

        <input type="text" name="fullName" placeholder="Full Name*" required />
        <input
          type="email"
          name="email"
          placeholder="Email Address*"
          required
        />
        <input type="tel" name="phone" placeholder="Phone Number*" required />
        <input type="date" name="dob" placeholder="Date of Birth*" required />

        <!-- Patient specific fields -->
        <div id="patientFields">
          <input
            type="text"
            name="emergencyContact"
            placeholder="Emergency Contact (Optional)"
          />
          <input
            type="text"
            name="allergies"
            placeholder="Known Allergies (Optional)"
          />
        </div>

        <!-- Doctor specific fields -->
        <div id="doctorFields" class="doctor-fields">
          <select name="specialization" required disabled>
            <option value="">Select Specialization*</option>
            <option value="general">General Practice</option>
            <option value="cardiology">Cardiology</option>
            <option value="dermatology">Dermatology</option>
            <option value="pediatrics">Pediatrics</option>
            <option value="orthopedics">Orthopedics</option>
          </select>
          <input
            type="text"
            name="licenseNumber"
            placeholder="Medical License Number*"
            required
            disabled
          />
          <input
            type="number"
            name="yearsExperience"
            placeholder="Years of Experience*"
            min="0"
            required
            disabled
          />
        </div>

        <input
          type="password"
          name="password"
          placeholder="Password*"
          required
        />
        <input
          type="password"
          name="confirmPassword"
          placeholder="Confirm Password*"
          required
        />

        <label class="terms-container">
          <input
            type="checkbox"
            name="termsAccepted"
            required
            class="terms-checkbox"
          />
          <span class="terms-label"
            >I agree to the Terms of Service and Privacy Policy*</span
          >
        </label>

        <button type="submit">Create Account</button>

        <p class="switch">
          Already have an account?
          <a href="login.html">Login</a>
        </p>
      </form>
    </main>

    <footer data-layout="footer"></footer>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script type="module" src="../js/signup.js"></script>
  </body>
</html>
